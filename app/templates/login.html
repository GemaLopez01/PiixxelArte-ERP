<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | PiixxelArte ERP</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
</head>

<body>

<div class="container-fluid vh-100">
    <div class="row h-100">

        <!-- LADO IZQUIERDO -->
        <div class="col-md-6 d-none d-md-flex branding-section">
            <div class="branding-content text-center">
                <img src="{{ url_for('static', filename='img/logo-piixxi.png') }}" class="logo mb-4">
                <h1 class="text-white">PiixxelArte ERP</h1>
                <p class="text-light">Sistema Integral de Gestión Empresarial</p>
            </div>
        </div>

        <!-- LADO DERECHO -->
        <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">

            <div class="login-card p-5">

                <h3 class="text-center mb-4">Iniciar sesión</h3>

                <form method="POST">

                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" name="password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Ingresar
                    </button>

                </form>

                <div class="text-center mt-4 small text-muted">
                    © 2026 PiixxelArte
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
