{% extends "base.html" %}

{% block content %}
<div class="dashboard-header">
    <h1><i class="fas fa-truck"></i> {% if supplier %}Editar Proveedor{% else %}Nuevo Proveedor{% endif %}</h1>
    <div class="header-actions">
        <a href="{{ url_for('inventory_suppliers') }}" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
    </div>
</div>

<div class="card">
    <form method="POST" class="modern-form">
        <div class="form-grid">
            <div class="form-group">
                <label>Nombre de la Empresa / Proveedor <span class="required">*</span></label>
                <input type="text" name="name" value="{{ supplier.name if supplier else '' }}" required class="form-control">
            </div>

            <div class="form-group">
                <label>Contacto (Persona)</label>
                <input type="text" name="contact_info" value="{{ supplier.contact_info if supplier else '' }}" class="form-control" placeholder="Nombre completo">
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" name="phone" value="{{ supplier.phone if supplier else '' }}" class="form-control" placeholder="10 dígitos">
            </div>
            
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" name="email" value="{{ supplier.email if supplier else '' }}" class="form-control">
            </div>
            
            <div class="form-group" style="grid-column: 1 / -1;">
                <label>Dirección</label>
                <textarea name="address" class="form-control" rows="2">{{ supplier.address if supplier else '' }}</textarea>
            </div>
        </div>

        <div class="form-actions mt-4">
            <button type="submit" class="btn btn-primary btn-large">
                <i class="fas fa-save"></i> Guardar Proveedor
            </button>
        </div>
    </form>
</div>
{% endblock %}
