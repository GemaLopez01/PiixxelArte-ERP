{% extends 'base.html' %}

{% block content %}
<div class="dashboard-header">
    <div class="dashboard-title">
        <h1>{{ 'Editar' if customer else 'Nuevo' }} Cliente</h1>
        <p>Ingresa la información personal y fiscal (opcional).</p>
    </div>
    <div class="header-actions">
        <a href="{{ url_for('customers_index') }}" class="btn btn-secondary">
            <i class="fa-solid fa-arrow-left"></i> Volver
        </a>
    </div>
</div>

<div class="section-card" style="max-width: 800px; margin: 0 auto; padding: 32px;">
    {% if customer %}
    <form method="POST" action="{{ url_for('edit_customer', customer_id=customer.id) }}">
    {% else %}
    <form method="POST" action="{{ url_for('new_customer') }}">
    {% endif %}

        <h3 style="margin-bottom: 20px; font-size: 1.2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 10px;">Datos Principales</h3>

        <!-- Nombre -->
        <div class="form-group mb-4">
            <label for="name" style="font-weight: 600;">Nombre Completo / Empresa *</label>
            <input type="text" class="form-control" style="padding: 12px;" id="name" name="name" required value="{{ customer.name if customer else '' }}">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px;">
            <!-- Teléfono -->
            <div class="form-group mb-0">
                <label for="phone" style="font-weight: 600;">Teléfono</label>
                <input type="tel" class="form-control" style="padding: 12px;" id="phone" name="phone" value="{{ customer.phone if customer else '' }}">
            </div>

            <!-- Email -->
            <div class="form-group mb-0">
                <label for="email" style="font-weight: 600;">Email</label>
                <input type="email" class="form-control" style="padding: 12px;" id="email" name="email" value="{{ customer.email if customer else '' }}">
            </div>
        </div>

        <!-- Requiere Factura Checkbox -->
        <div class="form-group" style="background:#F9FAFB; padding:16px; border-radius:8px; border:1px solid var(--border-light); margin-bottom:24px;">
            <label class="switch" style="display: flex; align-items: center; cursor: pointer; margin: 0;">
                <input type="checkbox" name="requires_invoice" id="requires_invoice" style="width: 20px; height: 20px; margin-right: 12px;" {% if customer and customer.requires_invoice %}checked{% endif %}>
                <span style="font-size: 1.05rem; font-weight: 600; color: var(--text-primary);">¿El cliente requiere Facturación?</span>
            </label>
        </div>

        <!-- Datos Fiscales (Hidden by default unless checked) -->
        <div id="billing-fields" style="display: {% if customer and customer.requires_invoice %}block{% else %}none{% endif %};">
            <h3 style="margin-bottom: 20px; font-size: 1.2rem; border-bottom: 1px solid var(--border-light); padding-bottom: 10px;">Datos Fiscales (Facturación)</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <!-- RFC -->
                <div class="form-group mb-0">
                    <label for="rfc" style="font-weight: 600;">RFC *</label>
                    <input type="text" class="form-control" style="padding: 12px; text-transform: uppercase;" id="rfc" name="rfc" value="{{ customer.rfc if customer else '' }}">
                </div>

                <!-- CP -->
                <div class="form-group mb-0">
                    <label for="zip_code" style="font-weight: 600;">Código Postal *</label>
                    <input type="text" class="form-control" style="padding: 12px;" id="zip_code" name="zip_code" value="{{ customer.zip_code if customer else '' }}">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <!-- Razón Social -->
                <div class="form-group mb-0">
                    <label for="business_name" style="font-weight: 600;">Razón Social *</label>
                    <input type="text" class="form-control" style="padding: 12px;" id="business_name" name="business_name" value="{{ customer.business_name if customer else '' }}">
                </div>

                <!-- Régimen Fiscal -->
                <div class="form-group mb-0">
                    <label for="tax_regime" style="font-weight: 600;">Régimen Fiscal (Clave SAT) *</label>
                    <input type="text" class="form-control" style="padding: 12px;" id="tax_regime" name="tax_regime" placeholder="Ej. 601, 612..." value="{{ customer.tax_regime if customer else '' }}">
                </div>
            </div>

            <!-- Dirección Fiscal -->
            <div class="form-group mb-4">
                <label for="billing_address" style="font-weight: 600;">Dirección Fiscal</label>
                <textarea class="form-control" style="padding: 12px;" id="billing_address" name="billing_address" rows="3">{{ customer.billing_address if customer else '' }}</textarea>
            </div>
        </div>

        <!-- Submit -->
        <div style="text-align: right; border-top: 1px solid var(--border-light); padding-top: 24px; margin-top: 10px;">
            <button type="submit" class="btn btn-primary" style="padding: 12px 32px; font-size: 1rem;">
                <i class="fa-solid fa-save"></i> Guardar Cliente
            </button>
        </div>

    </form>
</div>

<!-- JavaScript to toggle billing fields -->
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const checkbox = document.getElementById('requires_invoice');
        const billingDiv = document.getElementById('billing-fields');
        const rfcInput = document.getElementById('rfc');
        const zipInput = document.getElementById('zip_code');
        const businessNameInput = document.getElementById('business_name');
        const taxRegimeInput = document.getElementById('tax_regime');

        function toggleBillingFields() {
            if (checkbox.checked) {
                billingDiv.style.display = 'block';
                // Make required fields mandatory
                rfcInput.setAttribute('required', 'required');
                zipInput.setAttribute('required', 'required');
                businessNameInput.setAttribute('required', 'required');
                taxRegimeInput.setAttribute('required', 'required');
            } else {
                billingDiv.style.display = 'none';
                // Remove required attribute
                rfcInput.removeAttribute('required');
                zipInput.removeAttribute('required');
                businessNameInput.removeAttribute('required');
                taxRegimeInput.removeAttribute('required');
            }
        }

        // Attach listener
        checkbox.addEventListener('change', toggleBillingFields);
        
        // Trigger on load for the "Edit" context
        toggleBillingFields();
    });
</script>
{% endblock %}
